<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confidence - Confidence Book</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        
        .theme-calm {
            --theme-bg: #f8f9fa;
            --theme-surface: #ffffff;
            --theme-primary: #3b82f6;
            --theme-text-primary: #1f2937;
            --theme-text-secondary: #6b7280;
            --theme-border: #e5e7eb;
        }
        
        .dark .theme-calm {
            --theme-bg: #111827;
            --theme-surface: #1f2937;
            --theme-primary: #60a5fa;
            --theme-text-primary: #f9fafb;
            --theme-text-secondary: #9ca3af;
            --theme-border: #374151;
        }
        
        body { background-color: var(--theme-bg); color: var(--theme-text-primary); }
        .bg-surface { background-color: var(--theme-surface); }
        .text-secondary { color: var(--theme-text-secondary); }
        .border-theme { border-color: var(--theme-border); }
        .shadow-calm { box-shadow: 0 4px 12px 0 rgba(0, 0, 0, 0.05); }
    </style>
</head>

<body class="theme-calm min-h-screen">

    <!-- Header -->
    <header class="bg-surface shadow-calm sticky top-0 z-20 border-b border-theme">
        <div class="container mx-auto max-w-4xl px-4 py-4 flex items-center justify-between">
            <a href="/app.html" class="flex items-center space-x-2 text-primary hover:opacity-80">
                <svg class="w-6 h-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
                </svg>
                <span class="font-medium">Retour</span>
            </a>
            
            <h1 class="text-lg font-semibold">Confidence</h1>
            
            <div class="w-20"></div>
        </div>
    </header>

    <!-- Container -->
    <div class="container mx-auto max-w-4xl px-4 py-8">
        
        <!-- Confidence Principale -->
        <div id="main-confidence" class="mb-8">
            <div class="text-center py-12">
                <p class="text-secondary">Chargement...</p>
            </div>
        </div>

        <!-- Section Commentaires -->
        <div class="bg-surface rounded-2xl shadow-calm p-6">
            <h2 class="text-xl font-semibold mb-6">💬 Commentaires</h2>
            
            <!-- Form nouveau commentaire -->
            <div class="flex space-x-3 mb-6 pb-6 border-b border-theme">
                <div class="w-10 h-10 rounded-full bg-blue-100 dark:bg-blue-800 flex items-center justify-center flex-shrink-0">
                    <svg class="w-6 h-6 text-blue-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
                    </svg>
                </div>
                <div class="flex-1">
                    <textarea id="comment-input" rows="3" class="w-full p-3 rounded-lg border border-theme bg-surface focus:outline-none focus:ring-2 focus:ring-primary" placeholder="Répondre avec bienveillance..."></textarea>
                    <button onclick="submitComment()" class="mt-3 bg-primary text-white px-6 py-2 rounded-lg font-medium hover:opacity-90 transition">
                        Envoyer
                    </button>
                </div>
            </div>
            
            <!-- Liste commentaires -->
            <div id="comments-list" class="space-y-4">
                <!-- Rempli dynamiquement -->
            </div>
        </div>

    </div>

    <!-- Footer -->
    <footer class="bg-surface border-t border-theme mt-12 py-6">
        <div class="container mx-auto max-w-4xl px-4 text-center text-sm text-secondary space-y-2">
            <p>📧 <a href="mailto:nexusstudio100@gmail.com" class="hover:text-primary">Support</a> | 
               💬 <a href="https://wa.me/22969056283" target="_blank" class="hover:text-primary">WhatsApp</a> | 
               💙 <a href="https://wa.me/22969056283" target="_blank" class="hover:text-primary">Faire un don</a></p>
            <p class="text-xs">🌍 Aide internationale : <a href="tel:3114" class="text-red-600">3114 (FR)</a> | <a href="tel:1833456456" class="text-red-600">1-833-456-4566 (CA)</a></p>
        </div>
    </footer>

    <!-- JAVASCRIPT -->
    <script>
        const currentUserId = localStorage.getItem('confidence_user_id');
        const urlParams = new URLSearchParams(window.location.search);
        const confId = urlParams.get('id');
        
        if (!currentUserId) window.location.href = '/';
        if (!confId) window.location.href = '/app.html';
        
        const CHAPTERS = [
            { id: 'ruptures', emoji: '💔', name: 'Ruptures', color: 'red' },
            { id: 'isolement', emoji: '😔', name: 'Isolement', color: 'blue' },
            { id: 'traumas', emoji: '🔥', name: 'Traumas', color: 'orange' },
            { id: 'stress', emoji: '🧠', name: 'Stress', color: 'purple' },
            { id: 'spiritualite', emoji: '🪞', name: 'Spiritualité', color: 'indigo' },
            { id: 'espoir', emoji: '🤝', name: 'Espoir', color: 'teal' }
        ];

        const REACTIONS = [
            { id: 'soutien', emoji: '🤝', color: 'blue' },
            { id: 'espoir', emoji: '🔥', color: 'orange' },
            { id: 'compatis', emoji: '🤜🤛', color: 'purple' },
            { id: 'pas_seul', emoji: '🫂', color: 'green' },
            { id: 'courage', emoji: '🙌', color: 'yellow' },
            { id: 'triste', emoji: '💔', color: 'red' }
        ];

        document.addEventListener('DOMContentLoaded', loadPost);

        async function loadPost() {
            try {
                const response = await fetch(`/api/confidences?chapter=all`);
                const result = await response.json();
                
                if (result.success) {
                    const conf = result.data.find(c => c.id === confId);
                    if (conf) {
                        renderMainConfidence(conf);
                        renderComments(conf.responses || []);
                    } else {
                        window.location.href = '/app.html';
                    }
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        function renderMainConfidence(conf) {
            const chapter = CHAPTERS.find(ch => ch.id === conf.emotion) || CHAPTERS[0];
            const isOwner = conf.user_id === currentUserId;
            
            document.getElementById('main-confidence').innerHTML = `
                <article class="bg-surface rounded-2xl shadow-calm overflow-hidden">
                    <div class="p-6 flex items-center justify-between border-b border-theme">
                        <div class="flex items-center space-x-3">
                            <div class="w-12 h-12 rounded-full bg-${chapter.color}-100 dark:bg-${chapter.color}-800 flex items-center justify-center">
                                <span class="text-2xl">${chapter.emoji}</span>
                            </div>
                            <div>
                                <p class="font-semibold text-${chapter.color}-600">${chapter.name}</p>
                                <p class="text-xs text-secondary">${timeAgo(conf.created_at)}</p>
                            </div>
                        </div>
                        ${isOwner ? `
                            <div class="flex gap-2">
                                <button onclick="deleteConfidence('${conf.id}')" class="text-red-500 hover:underline">🗑️ Supprimer</button>
                            </div>
                        ` : ''}
                    </div>
                    
                    <div class="p-6">
                        <p class="text-xl leading-relaxed">${escapeHtml(conf.content)}</p>
                    </div>
                    
                    <div class="px-6 pb-6 flex flex-wrap gap-2">
                        ${REACTIONS.map(r => `
                            <button onclick="react('${conf.id}', '${r.id}')" class="text-sm border border-theme rounded-full py-2 px-4 hover:border-${r.color}-500 hover:bg-${r.color}-50 transition">
                                ${r.emoji} ${conf.reactions?.[r.id] || 0}
                            </button>
                        `).join('')}
                    </div>
                </article>
            `;
        }

        function renderComments(comments) {
            const container = document.getElementById('comments-list');
            
            if (comments.length === 0) {
                container.innerHTML = '<p class="text-center text-secondary py-8">Aucun commentaire. Soyez le premier à répondre.</p>';
                return;
            }
            
            container.innerHTML = comments.map(comment => `
                <div class="flex space-x-3">
                    <div class="w-10 h-10 rounded-full bg-purple-100 dark:bg-purple-800 flex items-center justify-center flex-shrink-0">
                        <span class="text-xl">${comment.avatar}</span>
                    </div>
                    <div class="flex-1 bg-gray-50 dark:bg-gray-800 rounded-xl p-4">
                        <p class="text-secondary leading-relaxed">${escapeHtml(comment.content)}</p>
                        <p class="text-xs text-secondary mt-2">${timeAgo(comment.created_at)}</p>
                    </div>
                </div>
            `).join('');
        }

        async function submitComment() {
            const text = document.getElementById('comment-input').value.trim();
            if (!text) return;
            
            try {
                const response = await fetch('/api/responses', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-User-Id': currentUserId
                    },
                    body: JSON.stringify({ confidenceId: confId, content: text })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    document.getElementById('comment-input').value = '';
                    loadPost();
                } else {
                    alert(result.message || 'Erreur');
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function react(confId, reactionId) {
            try {
                await fetch('/api/reactions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-User-Id': currentUserId
                    },
                    body: JSON.stringify({ confidenceId: confId, reactionType: reactionId })
                });
                loadPost();
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function deleteConfidence(id) {
            if (!confirm('Supprimer cette confidence ?')) return;
            
            try {
                await fetch(`/api/confidences/${id}`, {
                    method: 'DELETE',
                    headers: { 'X-User-Id': currentUserId }
                });
                window.location.href = '/app.html';
            } catch (error) {
                console.error('Error:', error);
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function timeAgo(timestamp) {
            const seconds = Math.floor((Date.now() - timestamp) / 1000);
            if (seconds < 60) return 'À l\'instant';
            if (seconds < 3600) return `Il y a ${Math.floor(seconds / 60)}min`;
            if (seconds < 86400) return `Il y a ${Math.floor(seconds / 3600)}h`;
            return `Il y a ${Math.floor(seconds / 86400)}j`;
        }
    </script>

</body>
</html>
