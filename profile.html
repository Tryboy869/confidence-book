<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Profil - Confidence Book</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #667eea; border-radius: 4px; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    
    <header class="bg-white border-b sticky top-0 z-20 shadow-sm">
        <div class="container mx-auto max-w-4xl px-4 py-3 flex items-center justify-between">
            <a href="/feed" class="text-gray-600 hover:text-gray-900">← Retour au fil</a>
            <h1 class="text-xl font-bold text-purple-600">Mon Profil</h1>
            <a href="/settings" class="text-gray-600 hover:text-gray-900">⚙️</a>
        </div>
    </header>
    
    <div class="container mx-auto max-w-4xl px-4 py-8">
        
        <!-- Stats Card -->
        <div class="bg-gradient-to-r from-purple-600 to-indigo-600 rounded-2xl shadow-xl p-8 text-white mb-8">
            <div class="flex items-center space-x-4 mb-6">
                <div class="w-20 h-20 rounded-full bg-white bg-opacity-20 flex items-center justify-center text-4xl" id="user-avatar">
                    📖
                </div>
                <div>
                    <p class="text-sm opacity-80">Mon ID anonyme</p>
                    <p class="text-2xl font-bold" id="user-id">CB_xxxxxxxx</p>
                    <p class="text-sm opacity-80 mt-1">Membre depuis <span id="join-date">...</span></p>
                </div>
            </div>
            
            <div class="grid grid-cols-3 gap-4">
                <div class="text-center">
                    <p class="text-3xl font-bold" id="stat-confidences">0</p>
                    <p class="text-sm opacity-80">Confidences</p>
                </div>
                <div class="text-center">
                    <p class="text-3xl font-bold" id="stat-reactions">0</p>
                    <p class="text-sm opacity-80">Réactions reçues</p>
                </div>
                <div class="text-center">
                    <p class="text-3xl font-bold" id="stat-responses">0</p>
                    <p class="text-sm opacity-80">Réponses reçues</p>
                </div>
            </div>
        </div>
        
        <!-- Mes Confidences -->
        <div class="bg-white rounded-2xl shadow-sm border p-6">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">📝 Mes Confidences</h2>
            
            <div id="my-confidences-list" class="space-y-4">
                <p class="text-center text-gray-500 py-8">Chargement...</p>
            </div>
        </div>
        
    </div>
    
    <script>
        const currentUserId = localStorage.getItem('user_id');
        
        if (!currentUserId) {
            window.location.href = '/';
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            loadProfile();
        });
        
        async function loadProfile() {
            try {
                const response = await fetch('/api/profile', {
                    headers: { 'X-User-Id': currentUserId }
                });
                
                const result = await response.json();
                
                if (result.success) {
                    renderProfile(result.profile);
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }
        
        function renderProfile(profile) {
            document.getElementById('user-id').textContent = profile.userId;
            document.getElementById('join-date').textContent = new Date(profile.joinedAt).toLocaleDateString('fr-FR');
            
            document.getElementById('stat-confidences').textContent = profile.confidences;
            document.getElementById('stat-reactions').textContent = profile.reactions;
            document.getElementById('stat-responses').textContent = profile.responses;
            
            loadMyConfidences();
        }
        
        async function loadMyConfidences() {
            try {
                const response = await fetch('/api/confidences?chapter=all');
                const result = await response.json();
                
                if (result.success) {
                    const myConfidences = result.data.filter(c => c.user_id === currentUserId);
                    renderMyConfidences(myConfidences);
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }
        
        function renderMyConfidences(confidences) {
            const container = document.getElementById('my-confidences-list');
            
            if (confidences.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-500 py-8">Vous n\'avez pas encore publié de confidence.</p>';
                return;
            }
            
            const html = confidences.map(conf => `
                <div class="border rounded-xl p-4 hover:bg-gray-50 transition">
                    <p class="text-gray-800 mb-2">${escapeHtml(conf.content.substring(0, 150))}${conf.content.length > 150 ? '...' : ''}</p>
                    <div class="flex items-center justify-between text-sm text-gray-500">
                        <span>${new Date(conf.created_at).toLocaleDateString('fr-FR')}</span>
                        <div class="space-x-2">
                            <span>💬 ${conf.responses?.length || 0}</span>
                            <span>💙 ${Object.values(conf.reactions).reduce((a,b) => a+b, 0)}</span>
                            <a href="/confidence/${conf.id}" class="text-purple-600 hover:underline">Voir →</a>
                        </div>
                    </div>
                </div>
            `).join('');
            
            container.innerHTML = html;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
    
</body>
</html>
