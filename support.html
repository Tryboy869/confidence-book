<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support - Confidence Book</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="/assets/translations.js"></script>
  <style>
    body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }
  </style>
</head>
<body class="p-6">
  <div class="max-w-3xl mx-auto">
    <button onclick="location.href='/feed.html'" class="flex items-center gap-2 text-white hover:text-purple-200 mb-6 transition">
      <i data-lucide="arrow-left" class="w-5 h-5"></i>
      <span id="back-btn">Retour</span>
    </button>

    <div class="bg-white rounded-3xl shadow-2xl p-8 mb-6">
      <div class="text-center mb-8">
        <i data-lucide="heart-handshake" class="w-16 h-16 mx-auto text-purple-600 mb-3"></i>
        <h1 class="text-3xl font-bold text-gray-800 mb-2" id="page-title"></h1>
        <p class="text-gray-600" id="page-subtitle"></p>
      </div>

      <div class="bg-purple-50 rounded-2xl p-6 mb-6">
        <h3 class="font-bold text-gray-800 mb-3" id="mission-title"></h3>
        <p class="text-gray-700 mb-4" id="mission-text"></p>
        <ul class="space-y-2">
          <li class="flex items-start gap-2">
            <i data-lucide="check-circle" class="w-5 h-5 text-green-600 flex-shrink-0 mt-0.5"></i>
            <span id="mission1"></span>
          </li>
          <li class="flex items-start gap-2">
            <i data-lucide="check-circle" class="w-5 h-5 text-green-600 flex-shrink-0 mt-0.5"></i>
            <span id="mission2"></span>
          </li>
          <li class="flex items-start gap-2">
            <i data-lucide="check-circle" class="w-5 h-5 text-green-600 flex-shrink-0 mt-0.5"></i>
            <span id="mission3"></span>
          </li>
          <li class="flex items-start gap-2">
            <i data-lucide="check-circle" class="w-5 h-5 text-green-600 flex-shrink-0 mt-0.5"></i>
            <span id="mission4"></span>
          </li>
        </ul>
      </div>

      <h3 class="font-bold text-gray-800 mb-4" id="ways-title"></h3>
      
      <div class="grid md:grid-cols-2 gap-4 mb-6">
        <div class="bg-gradient-to-br from-purple-50 to-indigo-50 rounded-xl p-6 border-2 border-purple-200">
          <i data-lucide="hand-coins" class="w-10 h-10 text-purple-600 mb-3"></i>
          <h4 class="font-bold text-gray-800 mb-2" id="way1-title"></h4>
          <p class="text-sm text-gray-600 mb-3" id="way1-desc"></p>
          <a href="https://wa.me/22969056283" class="inline-flex items-center gap-2 text-purple-600 hover:text-purple-700 font-semibold">
            <span>WhatsApp</span>
            <i data-lucide="arrow-right" class="w-4 h-4"></i>
          </a>
        </div>

        <div class="bg-gradient-to-br from-purple-50 to-indigo-50 rounded-xl p-6 border-2 border-purple-200">
          <i data-lucide="crown" class="w-10 h-10 text-purple-600 mb-3"></i>
          <h4 class="font-bold text-gray-800 mb-2" id="way2-title"></h4>
          <p class="text-sm text-gray-600 mb-3" id="way2-desc"></p>
          <a href="/premium.html" class="inline-flex items-center gap-2 text-purple-600 hover:text-purple-700 font-semibold">
            <span id="way2-link">Voir Premium</span>
            <i data-lucide="arrow-right" class="w-4 h-4"></i>
          </a>
        </div>

        <div class="bg-gradient-to-br from-purple-50 to-indigo-50 rounded-xl p-6 border-2 border-purple-200">
          <i data-lucide="share-2" class="w-10 h-10 text-purple-600 mb-3"></i>
          <h4 class="font-bold text-gray-800 mb-2" id="way3-title"></h4>
          <p class="text-sm text-gray-600" id="way3-desc"></p>
        </div>

        <div class="bg-gradient-to-br from-purple-50 to-indigo-50 rounded-xl p-6 border-2 border-purple-200">
          <i data-lucide="code" class="w-10 h-10 text-purple-600 mb-3"></i>
          <h4 class="font-bold text-gray-800 mb-2" id="way4-title"></h4>
          <p class="text-sm text-gray-600" id="way4-desc"></p>
        </div>
      </div>

      <div class="text-center py-6">
        <p class="text-2xl font-bold text-purple-600" id="thanks"></p>
      </div>
    </div>

    <div class="bg-white rounded-2xl p-6 text-center">
      <p class="text-sm text-gray-600 mb-2">Contact & Support</p>
      <div class="flex justify-center gap-4 text-sm">
        <a href="https://wa.me/22969056283" class="text-purple-600 hover:underline">WhatsApp</a>
        <span class="text-gray-400">|</span>
        <a href="mailto:nexusstudio100@gmail.com" class="text-purple-600 hover:underline">Email</a>
      </div>
    </div>
  </div>

  <script>
    const lang = getCurrentLanguage();

    document.getElementById('page-title').textContent = t('support.title', lang);
    document.getElementById('page-subtitle').textContent = t('support.subtitle', lang);
    
    document.getElementById('mission-title').textContent = t('support.mission_title', lang);
    document.getElementById('mission-text').textContent = t('support.mission_text', lang);
    document.getElementById('mission1').textContent = t('support.mission1', lang);
    document.getElementById('mission2').textContent = t('support.mission2', lang);
    document.getElementById('mission3').textContent = t('support.mission3', lang);
    document.getElementById('mission4').textContent = t('support.mission4', lang);
    
    document.getElementById('ways-title').textContent = t('support.ways_title', lang);
    document.getElementById('way1-title').textContent = t('support.way1_title', lang);
    document.getElementById('way1-desc').textContent = t('support.way1_desc', lang);
    document.getElementById('way2-title').textContent = t('support.way2_title', lang);
    document.getElementById('way2-desc').textContent = t('support.way2_desc', lang);
    document.getElementById('way3-title').textContent = t('support.way3_title', lang);
    document.getElementById('way3-desc').textContent = t('support.way3_desc', lang);
    document.getElementById('way4-title').textContent = t('support.way4_title', lang);
    document.getElementById('way4-desc').textContent = t('support.way4_desc', lang);
    
    document.getElementById('thanks').textContent = t('support.thanks', lang);

    lucide.createIcons();
  </script>
</body>
</html>
