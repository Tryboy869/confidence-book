<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💜</text></svg>">
  <title>Feed - Confidence Book</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="/assets/translations.js"></script>
  <style>
    body.dark { background: #0a0a0f; color: #e8e8f0; }
    body.light { background: #f8f9fa; color: #1f2937; }
    .card-dark { background: #1a1a24; }
    .card-light { background: #ffffff; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }
  </style>
</head>
<body class="dark p-6">
  <div class="max-w-4xl mx-auto">
    <header class="card-dark rounded-2xl p-6 mb-6 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <i data-lucide="heart" class="w-8 h-8 text-purple-500"></i>
        <h1 class="text-2xl font-bold" id="page-title"></h1>
      </div>
      <div class="flex gap-3">
        <button onclick="location.href='/profile.html'" class="p-2 hover:bg-purple-600/20 rounded-lg transition">
          <i data-lucide="user" class="w-6 h-6"></i>
        </button>
        <button onclick="location.href='/settings.html'" class="p-2 hover:bg-purple-600/20 rounded-lg transition">
          <i data-lucide="settings" class="w-6 h-6"></i>
        </button>
      </div>
    </header>

    <div class="card-dark rounded-2xl p-6 mb-6">
      <button onclick="openPublishModal()" class="w-full text-left px-4 py-3 bg-purple-600/10 hover:bg-purple-600/20 rounded-lg transition" id="publish-placeholder"></button>
    </div>

    <div class="flex gap-2 mb-6 overflow-x-auto pb-2">
      <button onclick="filterConfidences('all')" class="filter-btn px-4 py-2 rounded-lg whitespace-nowrap transition bg-purple-600 text-white" data-filter="all" id="filter-all"></button>
      <button onclick="filterConfidences('ruptures')" class="filter-btn px-4 py-2 rounded-lg whitespace-nowrap transition bg-purple-600/10" data-filter="ruptures" id="filter-ruptures"></button>
      <button onclick="filterConfidences('isolement')" class="filter-btn px-4 py-2 rounded-lg whitespace-nowrap transition bg-purple-600/10" data-filter="isolement" id="filter-isolement"></button>
      <button onclick="filterConfidences('traumas')" class="filter-btn px-4 py-2 rounded-lg whitespace-nowrap transition bg-purple-600/10" data-filter="traumas" id="filter-traumas"></button>
      <button onclick="filterConfidences('stress')" class="filter-btn px-4 py-2 rounded-lg whitespace-nowrap transition bg-purple-600/10" data-filter="stress" id="filter-stress"></button>
      <button onclick="filterConfidences('spiritualite')" class="filter-btn px-4 py-2 rounded-lg whitespace-nowrap transition bg-purple-600/10" data-filter="spiritualite" id="filter-spiritualite"></button>
      <button onclick="filterConfidences('espoir')" class="filter-btn px-4 py-2 rounded-lg whitespace-nowrap transition bg-purple-600/10" data-filter="espoir" id="filter-espoir"></button>
    </div>

    <div id="confidences-container"></div>
  </div>

  <div id="publish-modal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-50">
    <div class="card-dark rounded-2xl w-full max-w-2xl shadow-2xl p-6">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-xl font-bold" id="modal-title"></h2>
        <button onclick="closePublishModal()" class="p-2 hover:bg-purple-600/20 rounded-lg">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>
      <textarea id="confidence-content" rows="6" class="w-full px-4 py-3 bg-purple-600/10 rounded-lg border-2 border-transparent focus:border-purple-600 focus:outline-none mb-4" placeholder=""></textarea>
      <label class="block mb-2 text-sm font-semibold" id="emotion-label"></label>
      <select id="confidence-emotion" class="w-full px-4 py-3 bg-purple-600/10 rounded-lg mb-4">
        <option value="ruptures" id="emotion-ruptures"></option>
        <option value="isolement" id="emotion-isolement"></option>
        <option value="traumas" id="emotion-traumas"></option>
        <option value="stress" id="emotion-stress"></option>
        <option value="spiritualite" id="emotion-spiritualite"></option>
        <option value="espoir" id="emotion-espoir"></option>
      </select>
      <button onclick="publishConfidence()" class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 text-white font-semibold py-3 rounded-xl" id="publish-btn"></button>
    </div>
  </div>

  <div id="reactions-modal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-50">
    <div class="card-dark rounded-2xl p-6">
      <div class="grid grid-cols-2 gap-4">
        <button onclick="react('soutiens')" class="flex items-center gap-2 px-4 py-3 bg-blue-500/20 hover:bg-blue-500/30 rounded-lg transition">
          <i data-lucide="handshake" class="w-6 h-6 text-blue-500"></i>
          <span id="reaction-soutiens"></span>
        </button>
        <button onclick="react('espoir')" class="flex items-center gap-2 px-4 py-3 bg-yellow-500/20 hover:bg-yellow-500/30 rounded-lg transition">
          <i data-lucide="flame" class="w-6 h-6 text-yellow-500"></i>
          <span id="reaction-espoir"></span>
        </button>
        <button onclick="react('compatis')" class="flex items-center gap-2 px-4 py-3 bg-purple-500/20 hover:bg-purple-500/30 rounded-lg transition">
          <i data-lucide="heart" class="w-6 h-6 text-purple-500"></i>
          <span id="reaction-compatis"></span>
        </button>
        <button onclick="react('pas_seul')" class="flex items-center gap-2 px-4 py-3 bg-green-500/20 hover:bg-green-500/30 rounded-lg transition">
          <i data-lucide="users" class="w-6 h-6 text-green-500"></i>
          <span id="reaction-pas_seul"></span>
        </button>
        <button onclick="react('courage')" class="flex items-center gap-2 px-4 py-3 bg-orange-500/20 hover:bg-orange-500/30 rounded-lg transition">
          <i data-lucide="zap" class="w-6 h-6 text-orange-500"></i>
          <span id="reaction-courage"></span>
        </button>
        <button onclick="react('triste')" class="flex items-center gap-2 px-4 py-3 bg-red-500/20 hover:bg-red-500/30 rounded-lg transition">
          <i data-lucide="frown" class="w-6 h-6 text-red-500"></i>
          <span id="reaction-triste"></span>
        </button>
      </div>
    </div>
  </div>

  <script>
    const userId = localStorage.getItem('confidenceBookUserID');
    if (!userId) location.href = '/auth.html';

    const lang = getCurrentLanguage();
    let currentFilter = 'all';
    let currentConfidenceId = null;
    let editingConfidenceId = null;

    document.getElementById('page-title').textContent = t('feed.title', lang);
    document.getElementById('publish-placeholder').textContent = t('feed.publish_placeholder', lang);
    document.getElementById('modal-title').textContent = t('feed.modal_title', lang);
    document.getElementById('emotion-label').textContent = t('feed.modal_emotion_label', lang);
    document.getElementById('publish-btn').textContent = t('feed.modal_publish', lang);

    document.getElementById('filter-all').textContent = t('feed.filter_all', lang);
    document.getElementById('filter-ruptures').textContent = t('feed.filter_ruptures', lang);
    document.getElementById('filter-isolement').textContent = t('feed.filter_isolement', lang);
    document.getElementById('filter-traumas').textContent = t('feed.filter_traumas', lang);
    document.getElementById('filter-stress').textContent = t('feed.filter_stress', lang);
    document.getElementById('filter-spiritualite').textContent = t('feed.filter_spiritualite', lang);
    document.getElementById('filter-espoir').textContent = t('feed.filter_espoir', lang);

    document.getElementById('emotion-ruptures').textContent = t('emotions.ruptures', lang);
    document.getElementById('emotion-isolement').textContent = t('emotions.isolement', lang);
    document.getElementById('emotion-traumas').textContent = t('emotions.traumas', lang);
    document.getElementById('emotion-stress').textContent = t('emotions.stress', lang);
    document.getElementById('emotion-spiritualite').textContent = t('emotions.spiritualite', lang);
    document.getElementById('emotion-espoir').textContent = t('emotions.espoir', lang);

    document.getElementById('reaction-soutiens').textContent = t('reactions.soutiens', lang);
    document.getElementById('reaction-espoir').textContent = t('reactions.espoir', lang);
    document.getElementById('reaction-compatis').textContent = t('reactions.compatis', lang);
    document.getElementById('reaction-pas_seul').textContent = t('reactions.pas_seul', lang);
    document.getElementById('reaction-courage').textContent = t('reactions.courage', lang);
    document.getElementById('reaction-triste').textContent = t('reactions.triste', lang);

    async function loadConfidences() {
      try {
        const response = await fetch(`/api/confidences?chapter=${currentFilter}`, {
          headers: { 'X-User-ID': userId }
        });
        const data = await response.json();

        if (data.success) {
          renderConfidences(data.confidences);
        }
      } catch (error) {
        console.error('Error loading confidences:', error);
      }
    }

    function renderConfidences(confidences) {
      const container = document.getElementById('confidences-container');
      
      if (confidences.length === 0) {
        container.innerHTML = `<p class="text-center text-gray-500 py-8">${t('feed.no_confidences', lang)}</p>`;
        return;
      }

      container.innerHTML = confidences.map(conf => `
        <div class="card-dark rounded-2xl p-6 mb-4">
          <div class="flex items-center gap-2 mb-3">
            <i data-lucide="message-circle" class="w-5 h-5 text-purple-500"></i>
            <span class="text-sm text-purple-400">${t('emotions.' + conf.emotion, lang)}</span>
          </div>
          <p class="mb-4 leading-relaxed">${conf.content}</p>
          <div class="flex gap-4">
            <button onclick="openReactionsModal('${conf.id}')" class="flex items-center gap-2 text-sm text-gray-400 hover:text-purple-400 transition">
              <i data-lucide="heart" class="w-4 h-4"></i>
              <span>${conf.reaction_count} ${t('feed.reactions', lang)}</span>
            </button>
            <button onclick="location.href='/confidence.html?id=${conf.id}'" class="flex items-center gap-2 text-sm text-gray-400 hover:text-purple-400 transition">
              <i data-lucide="message-square" class="w-4 h-4"></i>
              <span>${conf.response_count} ${t('feed.comments', lang)}</span>
            </button>
            ${conf.user_id === userId ? `
              <button onclick="editConfidence('${conf.id}')" class="flex items-center gap-2 text-sm text-gray-400 hover:text-purple-400 transition ml-auto">
                <i data-lucide="edit" class="w-4 h-4"></i>
              </button>
              <button onclick="deleteConfidence('${conf.id}')" class="flex items-center gap-2 text-sm text-gray-400 hover:text-red-400 transition">
                <i data-lucide="trash" class="w-4 h-4"></i>
              </button>
            ` : ''}
          </div>
        </div>
      `).join('');

      lucide.createIcons();
    }

    function filterConfidences(filter) {
      currentFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(btn => {
        if (btn.dataset.filter === filter) {
          btn.className = 'filter-btn px-4 py-2 rounded-lg whitespace-nowrap transition bg-purple-600 text-white';
        } else {
          btn.className = 'filter-btn px-4 py-2 rounded-lg whitespace-nowrap transition bg-purple-600/10';
        }
      });
      loadConfidences();
    }

    function openPublishModal() {
      document.getElementById('publish-modal').classList.remove('hidden');
      document.getElementById('confidence-content').value = '';
      editingConfidenceId = null;
      lucide.createIcons();
    }

    function closePublishModal() {
      document.getElementById('publish-modal').classList.add('hidden');
    }

    async function publishConfidence() {
      const content = document.getElementById('confidence-content').value.trim();
      const emotion = document.getElementById('confidence-emotion').value;

      if (content.length < 10) return;

      try {
        const url = editingConfidenceId ? `/api/confidences/${editingConfidenceId}` : '/api/confidences';
        const method = editingConfidenceId ? 'PUT' : 'POST';

        const response = await fetch(url, {
          method,
          headers: {
            'Content-Type': 'application/json',
            'X-User-ID': userId
          },
          body: JSON.stringify({ content, emotion })
        });

        const data = await response.json();

        if (data.success) {
          closePublishModal();
          loadConfidences();
        } else {
          alert(data.message);
        }
      } catch (error) {
        alert(t('common.error', lang));
      }
    }

    async function editConfidence(id) {
      try {
        const response = await fetch(`/api/confidences/${id}`, {
          headers: { 'X-User-ID': userId }
        });
        const data = await response.json();

        if (data.success) {
          document.getElementById('confidence-content').value = data.confidence.content;
          document.getElementById('confidence-emotion').value = data.confidence.emotion;
          editingConfidenceId = id;
          document.getElementById('publish-modal').classList.remove('hidden');
          lucide.createIcons();
        }
      } catch (error) {
        alert(t('common.error', lang));
      }
    }

    async function deleteConfidence(id) {
      if (!confirm(t('feed.delete_confirm', lang))) return;

      try {
        const response = await fetch(`/api/confidences/${id}`, {
          method: 'DELETE',
          headers: { 'X-User-ID': userId }
        });

        const data = await response.json();

        if (data.success) {
          loadConfidences();
        }
      } catch (error) {
        alert(t('common.error', lang));
      }
    }

    function openReactionsModal(confId) {
      currentConfidenceId = confId;
      document.getElementById('reactions-modal').classList.remove('hidden');
      lucide.createIcons();
    }

    async function react(type) {
      if (!currentConfidenceId) return;

      try {
        const response = await fetch('/api/reactions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-User-ID': userId
          },
          body: JSON.stringify({
            confidenceId: currentConfidenceId,
            type
          })
        });

        const data = await response.json();

        if (data.success) {
          document.getElementById('reactions-modal').classList.add('hidden');
          loadConfidences();
        }
      } catch (error) {
        alert(t('common.error', lang));
      }
    }

    document.getElementById('reactions-modal').addEventListener('click', (e) => {
      if (e.target.id === 'reactions-modal') {
        document.getElementById('reactions-modal').classList.add('hidden');
      }
    });

    loadConfidences();
    lucide.createIcons();
  </script>
</body>
</html>
