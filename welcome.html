<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💜</text></svg>">
  <title>Welcome - Confidence Book</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="/assets/translations.js"></script>
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
  </style>
</head>
<body class="p-6">
  <div class="max-w-4xl mx-auto">
    <div class="bg-white rounded-3xl shadow-2xl p-8 md:p-12">
      <div class="text-center mb-8">
        <div class="flex justify-center mb-4">
          <i data-lucide="heart" class="w-16 h-16 text-purple-600"></i>
        </div>
        <h1 class="text-4xl font-bold text-gray-800 mb-3" id="title"></h1>
        <p class="text-xl text-gray-600 mb-6" id="subtitle"></p>
        <p class="text-gray-700 leading-relaxed" id="mission"></p>
      </div>

      <div class="bg-purple-50 rounded-2xl p-6 mb-8">
        <h2 class="text-2xl font-bold text-purple-800 mb-4 flex items-center gap-2">
          <i data-lucide="shield-check" class="w-6 h-6"></i>
          <span id="rules-title"></span>
        </h2>
        <ul class="space-y-3">
          <li class="flex items-start gap-3">
            <i data-lucide="check-circle" class="w-5 h-5 text-green-600 mt-1 flex-shrink-0"></i>
            <span class="text-gray-700" id="rule1"></span>
          </li>
          <li class="flex items-start gap-3">
            <i data-lucide="check-circle" class="w-5 h-5 text-green-600 mt-1 flex-shrink-0"></i>
            <span class="text-gray-700" id="rule2"></span>
          </li>
          <li class="flex items-start gap-3">
            <i data-lucide="check-circle" class="w-5 h-5 text-green-600 mt-1 flex-shrink-0"></i>
            <span class="text-gray-700" id="rule3"></span>
          </li>
          <li class="flex items-start gap-3">
            <i data-lucide="check-circle" class="w-5 h-5 text-green-600 mt-1 flex-shrink-0"></i>
            <span class="text-gray-700" id="rule4"></span>
          </li>
          <li class="flex items-start gap-3">
            <i data-lucide="check-circle" class="w-5 h-5 text-green-600 mt-1 flex-shrink-0"></i>
            <span class="text-gray-700" id="rule5"></span>
          </li>
        </ul>
      </div>

      <div class="mb-8">
        <h3 class="text-xl font-bold text-gray-800 mb-3 flex items-center gap-2">
          <i data-lucide="phone" class="w-5 h-5 text-red-600"></i>
          <span id="emergency-title"></span>
        </h3>
        <p class="text-gray-600 mb-3" id="emergency-subtitle"></p>
        <div class="flex flex-wrap gap-3">
          <div class="flex items-center gap-2 bg-red-50 px-4 py-2 rounded-lg">
            <span class="text-2xl">🇫🇷</span>
            <span class="font-semibold text-red-700">3114</span>
          </div>
          <div class="flex items-center gap-2 bg-red-50 px-4 py-2 rounded-lg">
            <span class="text-2xl">🇧🇪</span>
            <span class="font-semibold text-red-700">0800 32 123</span>
          </div>
          <div class="flex items-center gap-2 bg-red-50 px-4 py-2 rounded-lg">
            <span class="text-2xl">🇨🇦</span>
            <span class="font-semibold text-red-700">1-833-456-4566</span>
          </div>
        </div>
      </div>

      <div class="flex gap-3 mb-6">
        <button onclick="setLanguage('fr')" class="px-4 py-2 rounded-lg border-2 transition" id="lang-fr">Français</button>
        <button onclick="setLanguage('en')" class="px-4 py-2 rounded-lg border-2 transition" id="lang-en">English</button>
      </div>

      <button onclick="location.href='/auth.html'" class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 text-white font-semibold py-4 px-6 rounded-xl shadow-lg hover:shadow-xl transform hover:-translate-y-0.5 transition-all duration-200 flex items-center justify-center gap-2" id="accept-btn">
        <i data-lucide="arrow-right" class="w-5 h-5"></i>
      </button>
    </div>
  </div>

  <script>
    const lang = getCurrentLanguage();
    document.getElementById('title').textContent = t('welcome.title', lang);
    document.getElementById('subtitle').textContent = t('welcome.subtitle', lang);
    document.getElementById('mission').textContent = t('welcome.mission', lang);
    document.getElementById('rules-title').textContent = t('welcome.rules_title', lang);
    document.getElementById('rule1').textContent = t('welcome.rule1', lang);
    document.getElementById('rule2').textContent = t('welcome.rule2', lang);
    document.getElementById('rule3').textContent = t('welcome.rule3', lang);
    document.getElementById('rule4').textContent = t('welcome.rule4', lang);
    document.getElementById('rule5').textContent = t('welcome.rule5', lang);
    document.getElementById('emergency-title').textContent = t('welcome.emergency_title', lang);
    document.getElementById('emergency-subtitle').textContent = t('welcome.emergency_subtitle', lang);
    document.getElementById('accept-btn').innerHTML = `<i data-lucide="arrow-right" class="w-5 h-5"></i><span>${t('welcome.accept', lang)}</span>`;

    const currentLang = getCurrentLanguage();
    if (currentLang === 'fr') {
      document.getElementById('lang-fr').className = 'px-4 py-2 rounded-lg border-2 border-purple-600 bg-purple-600 text-white transition';
      document.getElementById('lang-en').className = 'px-4 py-2 rounded-lg border-2 border-gray-300 transition hover:border-purple-600';
    } else {
      document.getElementById('lang-en').className = 'px-4 py-2 rounded-lg border-2 border-purple-600 bg-purple-600 text-white transition';
      document.getElementById('lang-fr').className = 'px-4 py-2 rounded-lg border-2 border-gray-300 transition hover:border-purple-600';
    }

    lucide.createIcons();
  </script>
</body>
</html>
