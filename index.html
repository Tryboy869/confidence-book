<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confidence Book - Ton refuge émotionnel</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    :root {
      --bg-primary: #0a0a0f;
      --bg-card: #1a1a24;
      --text-primary: #e8e8f0;
      --text-secondary: #9090a8;
      --accent-hope: #6b8cff;
      --accent-pain: #ff6b9d;
      --accent-calm: #70d6a3;
      --accent-warning: #ffb86c;
      --accent-crisis: #ff5555;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      padding: 20px;
      max-width: 800px;
      margin: 0 auto;
    }
    
    header {
      text-align: center;
      padding: 40px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      margin-bottom: 40px;
      position: relative;
    }
    
    h1 {
      font-size: 2.5rem;
      font-weight: 300;
      margin-bottom: 10px;
      background: linear-gradient(135deg, var(--accent-hope), var(--accent-pain));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .tagline {
      color: var(--text-secondary);
      font-size: 1rem;
    }
    
    /* ========== AUTH BUTTONS ========== */
    .auth-buttons {
      position: absolute;
      top: 40px;
      left: 20px;
      display: flex;
      gap: 10px;
    }
    
    .auth-btn {
      background: var(--bg-card);
      border: 1px solid rgba(255,255,255,0.2);
      color: var(--text-primary);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    
    .auth-btn:hover {
      background: var(--accent-hope);
      border-color: var(--accent-hope);
    }
    
    /* ========== USER INFO ========== */
    .user-info {
      position: absolute;
      top: 40px;
      left: 20px;
      background: var(--bg-card);
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 0.9rem;
      color: var(--text-secondary);
    }
    
    /* ========== NOTIFICATIONS ========== */
    .notification-bell {
      position: absolute;
      top: 40px;
      right: 20px;
      cursor: pointer;
      font-size: 1.5rem;
      position: relative;
      user-select: none;
    }
    
    .notification-badge {
      position: absolute;
      top: -5px;
      right: -5px;
      background: var(--accent-crisis);
      color: white;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      font-size: 0.7rem;
      display: none;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }
    
    .notification-panel {
      position: fixed;
      top: 0;
      right: -400px;
      width: 400px;
      height: 100vh;
      background: var(--bg-card);
      box-shadow: -5px 0 20px rgba(0,0,0,0.5);
      transition: right 0.3s ease;
      z-index: 1000;
      overflow-y: auto;
      padding: 20px;
    }
    
    .notification-panel.open {
      right: 0;
    }
    
    .notification-item {
      background: var(--bg-primary);
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 15px;
      border-left: 4px solid var(--accent-hope);
    }
    
    .notification-item.crisis {
      border-left-color: var(--accent-crisis);
    }
    
    .notification-item.warning {
      border-left-color: var(--accent-warning);
    }
    
    .notification-item.support {
      border-left-color: var(--accent-calm);
    }
    
    .notification-close {
      background: rgba(255,255,255,0.1);
      border: none;
      color: var(--text-primary);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
      width: 100%;
    }
    
    /* ========== MODAL AUTH ========== */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      z-index: 2000;
      align-items: center;
      justify-content: center;
    }
    
    .modal.open {
      display: flex;
    }
    
    .modal-content {
      background: var(--bg-card);
      padding: 40px;
      border-radius: 16px;
      max-width: 400px;
      width: 90%;
    }
    
    .modal input {
      width: 100%;
      padding: 12px;
      background: var(--bg-primary);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text-primary);
      border-radius: 8px;
      font-size: 1rem;
      margin-bottom: 15px;
    }
    
    .modal input:focus {
      outline: none;
      border-color: var(--accent-hope);
    }
    
    .modal button {
      width: 100%;
      background: var(--accent-hope);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      margin-bottom: 10px;
    }
    
    .modal button:hover {
      opacity: 0.9;
    }
    
    .modal .cancel-btn {
      background: rgba(255,255,255,0.1);
    }
    
    .chapters {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 40px;
    }
    
    .chapter-btn {
      background: var(--bg-card);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: center;
    }
    
    .chapter-btn:hover {
      transform: translateY(-2px);
      border-color: var(--accent-hope);
    }
    
    .chapter-btn.active {
      border-color: var(--accent-hope);
      background: rgba(107, 140, 255, 0.1);
    }
    
    .confidence-card {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 30px;
      margin-bottom: 20px;
      border-left: 4px solid var(--accent-hope);
    }
    
    .confidence-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 15px;
      font-size: 0.9rem;
      color: var(--text-secondary);
    }
    
    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-hope), var(--accent-pain));
    }
    
    .confidence-text {
      font-size: 1.1rem;
      line-height: 1.8;
      margin-bottom: 20px;
      white-space: pre-wrap;
    }
    
    .confidence-actions {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }
    
    .action-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 8px 16px;
      border-radius: 8px;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    
    .action-btn:hover {
      background: rgba(255,255,255,0.1);
      color: var(--text-primary);
    }
    
    .publish-form {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 30px;
      margin-bottom: 40px;
    }
    
    textarea {
      width: 100%;
      min-height: 150px;
      background: var(--bg-primary);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 15px;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 1rem;
      resize: vertical;
      margin-bottom: 15px;
    }
    
    textarea:focus {
      outline: none;
      border-color: var(--accent-hope);
    }
    
    select {
      width: 100%;
      padding: 12px;
      background: var(--bg-primary);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text-primary);
      border-radius: 8px;
      font-size: 1rem;
      margin-bottom: 15px;
      cursor: pointer;
    }
    
    select:focus {
      outline: none;
      border-color: var(--accent-hope);
    }
    
    .submit-btn {
      background: var(--accent-hope);
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s;
      width: 100%;
    }
    
    .submit-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(107, 140, 255, 0.3);
    }
    
    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .loading {
      text-align: center;
      padding: 60px;
      color: var(--text-secondary);
    }
    
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-secondary);
    }
    
    /* ========== DEBUG CONSOLE ========== */
    .debug-console {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      max-height: 200px;
      background: #1a1a1a;
      border-top: 2px solid var(--accent-hope);
      overflow-y: auto;
      font-family: monospace;
      font-size: 0.8rem;
      padding: 10px;
      display: none;
      z-index: 9999;
    }
    
    .debug-console.open {
      display: block;
    }
    
    .debug-line {
      padding: 2px 0;
    }
    
    .debug-line.success { color: #70d6a3; }
    .debug-line.error { color: #ff5555; }
    .debug-line.info { color: #6b8cff; }
    
    @media (max-width: 600px) {
      h1 {
        font-size: 2rem;
      }
      
      .chapters {
        grid-template-columns: repeat(2, 1fr);
      }
      
      .confidence-card {
        padding: 20px;
      }
      
      .notification-panel {
        width: 100%;
        right: -100%;
      }
      
      .notification-bell, .user-info, .auth-buttons {
        position: static;
        margin: 10px auto;
        display: flex;
        justify-content: center;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>Confidence Book</h1>
    <p class="tagline">Ton refuge émotionnel anonyme</p>
    
    <!-- Auth Buttons OU User Info -->
    <div id="authContainer"></div>
    
    <!-- Notification Bell -->
    <div class="notification-bell" id="notificationBell">
      🔔
      <span class="notification-badge" id="notificationBadge">0</span>
    </div>
  </header>

  <!-- Auth Modal -->
  <div class="modal" id="authModal">
    <div class="modal-content">
      <h2 id="modalTitle">S'inscrire</h2>
      <p style="color: var(--text-secondary); margin-bottom: 20px;">
        Crée ton compte anonyme pour commencer à partager
      </p>
      <input type="email" id="emailInput" placeholder="Email (pour te reconnecter)" />
      <input type="number" id="ageInput" placeholder="Âge (18+ requis)" min="18" max="120" />
      <button id="authSubmitBtn">Créer mon compte</button>
      <button class="cancel-btn" id="authCancelBtn">Annuler</button>
    </div>
  </div>

  <!-- Notification Panel -->
  <div class="notification-panel" id="notificationPanel">
    <h2 style="margin-bottom: 20px;">Notifications</h2>
    <div id="notificationsList"></div>
  </div>

  <!-- Chapitres émotionnels -->
  <section class="chapters">
    <div class="chapter-btn active" data-chapter="all">
      <div style="font-size: 2rem; margin-bottom: 10px;">🌌</div>
      <div>Toutes</div>
    </div>
    <div class="chapter-btn" data-chapter="ruptures">
      <div style="font-size: 2rem; margin-bottom: 10px;">💔</div>
      <div>Ruptures</div>
    </div>
    <div class="chapter-btn" data-chapter="isolement">
      <div style="font-size: 2rem; margin-bottom: 10px;">😔</div>
      <div>Isolement</div>
    </div>
    <div class="chapter-btn" data-chapter="trauma">
      <div style="font-size: 2rem; margin-bottom: 10px;">🔥</div>
      <div>Traumas</div>
    </div>
    <div class="chapter-btn" data-chapter="espoir">
      <div style="font-size: 2rem; margin-bottom: 10px;">🤝</div>
      <div>Espoir</div>
    </div>
  </section>

  <!-- Formulaire publication -->
  <section class="publish-form" id="publishForm">
    <h2 style="margin-bottom: 20px;">Partage ton histoire</h2>
    <textarea 
      id="confidenceText" 
      placeholder="Écris ce que tu portes... Personne ne saura que c'est toi."
    ></textarea>
    
    <select id="chapterSelect">
      <option value="ruptures">💔 Ruptures</option>
      <option value="isolement">😔 Isolement</option>
      <option value="trauma">🔥 Traumas</option>
      <option value="espoir">🤝 Espoir</option>
    </select>
    
    <button class="submit-btn" id="publishBtn">
      Partager anonymement
    </button>
  </section>

  <!-- Liste des confidences -->
  <section id="confidencesList"></section>

  <!-- Debug Console -->
  <div class="debug-console" id="debugConsole"></div>

  <script>
    // ========== DEBUG LOGGER ==========
    const Debug = {
      enabled: true,
      log(message, type = 'info') {
        if (!this.enabled) return;
        
        console.log(`[${type.toUpperCase()}]`, message);
        
        const console = document.getElementById('debugConsole');
        const line = document.createElement('div');
        line.className = `debug-line ${type}`;
        line.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
        console.appendChild(line);
        console.scrollTop = console.scrollHeight;
      },
      
      success(msg) { this.log(msg, 'success'); },
      error(msg) { this.log(msg, 'error'); },
      info(msg) { this.log(msg, 'info'); }
    };
    
    // Toggle debug console avec Ctrl+D
    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.key === 'd') {
        e.preventDefault();
        document.getElementById('debugConsole').classList.toggle('open');
      }
    });

    // ========== MAIN APP ==========
    const App = {
      state: {
        user: null,
        confidences: [],
        notifications: [],
        currentChapter: 'all',
        notificationPanelOpen: false
      },
      
      async init() {
        Debug.info('🚀 Initializing Confidence Book...');
        
        try {
          // Charger utilisateur depuis localStorage
          const savedUser = localStorage.getItem('cb_user');
          if (savedUser) {
            this.state.user = JSON.parse(savedUser);
            Debug.success(`✅ User loaded: ${this.state.user.id}`);
          }
          
          this.renderAuthState();
          this.setupEventListeners();
          await this.loadConfidences();
          
          if (this.state.user) {
            await this.loadNotifications();
            setInterval(() => this.loadNotifications(), 30000);
          }
          
          Debug.success('✅ App initialized successfully');
        } catch (error) {
          Debug.error(`❌ Init error: ${error.message}`);
        }
      },
      
      setupEventListeners() {
        Debug.info('Setting up event listeners...');
        
        // Chapitres
        document.querySelectorAll('.chapter-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            Debug.info(`Chapter selected: ${btn.dataset.chapter}`);
            document.querySelectorAll('.chapter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            this.state.currentChapter = btn.dataset.chapter;
            this.renderConfidences();
          });
        });
        
        // Publish button
        document.getElementById('publishBtn').addEventListener('click', () => this.publishConfidence());
        
        // Notification bell
        document.getElementById('notificationBell').addEventListener('click', () => this.toggleNotifications());
        
        // Auth modal
        document.getElementById('authSubmitBtn').addEventListener('click', () => this.handleAuth());
        document.getElementById('authCancelBtn').addEventListener('click', () => this.closeAuthModal());
        
        Debug.success('✅ Event listeners configured');
      },
      
      // ========== AUTH ==========
      renderAuthState() {
        const container = document.getElementById('authContainer');
        
        if (this.state.user) {
          container.innerHTML = `
            <div class="user-info">
              👤 Connecté(e) | <span style="cursor: pointer; color: var(--accent-pain);" onclick="App.logout()">Déconnexion</span>
            </div>
          `;
        } else {
          container.innerHTML = `
            <div class="auth-buttons">
              <button class="auth-btn" onclick="App.openAuthModal()">S'inscrire</button>
            </div>
          `;
        }
      },
      
      openAuthModal() {
        Debug.info('Opening auth modal');
        document.getElementById('authModal').classList.add('open');
      },
      
      closeAuthModal() {
        document.getElementById('authModal').classList.remove('open');
        document.getElementById('emailInput').value = '';
        document.getElementById('ageInput').value = '';
      },
      
      async handleAuth() {
        const email = document.getElementById('emailInput').value.trim();
        const age = parseInt(document.getElementById('ageInput').value);
        
        if (!email || !email.includes('@')) {
          alert('Email invalide');
          return;
        }
        
        if (!age || age < 18) {
          alert('Tu dois avoir au moins 18 ans');
          return;
        }
        
        Debug.info(`Creating user: ${email}, age: ${age}`);
        
        const user = {
          id: 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9),
          email,
          age,
          createdAt: new Date().toISOString()
        };
        
        this.state.user = user;
        localStorage.setItem('cb_user', JSON.stringify(user));
        
        this.closeAuthModal();
        this.renderAuthState();
        
        Debug.success(`✅ User created: ${user.id}`);
        alert('✅ Compte créé ! Tu peux maintenant partager tes confidences.');
      },
      
      logout() {
        if (!confirm('Es-tu sûr(e) de vouloir te déconnecter ?')) return;
        
        Debug.info('Logging out user');
        localStorage.removeItem('cb_user');
        this.state.user = null;
        this.renderAuthState();
        alert('👋 À bientôt !');
      },
      
      // ========== NOTIFICATIONS ==========
      async loadNotifications() {
        if (!this.state.user) return;
        
        try {
          Debug.info('Loading notifications...');
          
          const response = await fetch('/api/notifications', {
            headers: { 'X-User-Id': this.state.user.id }
          });
          
          const data = await response.json();
          
          if (data.success) {
            this.state.notifications = data.data;
            this.updateNotificationBadge();
            Debug.success(`✅ Loaded ${data.data.length} notifications`);
          }
        } catch (error) {
          Debug.error(`❌ Load notifications error: ${error.message}`);
        }
      },
      
      updateNotificationBadge() {
        const badge = document.getElementById('notificationBadge');
        const count = this.state.notifications.length;
        
        if (count > 0) {
          badge.textContent = count > 9 ? '9+' : count;
          badge.style.display = 'flex';
        } else {
          badge.style.display = 'none';
        }
      },
      
      toggleNotifications() {
        if (!this.state.user) {
          alert('Inscris-toi pour voir tes notifications');
          return;
        }
        
        const panel = document.getElementById('notificationPanel');
        this.state.notificationPanelOpen = !this.state.notificationPanelOpen;
        
        if (this.state.notificationPanelOpen) {
          panel.classList.add('open');
          this.renderNotifications();
          Debug.info('Notification panel opened');
        } else {
          panel.classList.remove('open');
        }
      },
      
      renderNotifications() {
        const container = document.getElementById('notificationsList');
        
        if (this.state.notifications.length === 0) {
          container.innerHTML = '<p style="color: var(--text-secondary); text-align: center;">Aucune notification</p>';
          return;
        }
        
        container.innerHTML = this.state.notifications.map(notif => `
          <div class="notification-item ${notif.type}">
            <div style="white-space: pre-wrap; margin-bottom: 10px;">${this.escapeHtml(notif.message)}</div>
            <small style="color: var(--text-secondary);">${this.formatDate(notif.created_at)}</small>
            <button class="notification-close" onclick="App.markNotificationRead('${notif.id}')">
              J'ai lu
            </button>
          </div>
        `).join('');
      },
      
      async markNotificationRead(notificationId) {
        try {
          Debug.info(`Marking notification as read: ${notificationId}`);
          
          await fetch(`/api/notifications/${notificationId}/read`, {
            method: 'POST',
            headers: { 'X-User-Id': this.state.user.id }
          });
          
          await this.loadNotifications();
          Debug.success('✅ Notification marked as read');
        } catch (error) {
          Debug.error(`❌ Mark notification error: ${error.message}`);
        }
      },
      
      // ========== CONFIDENCES ==========
      async loadConfidences() {
        try {
          Debug.info('Loading confidences...');
          document.getElementById('confidencesList').innerHTML = '<div class="loading">Chargement des histoires...</div>';
          
          const response = await fetch('/api/confidences');
          const data = await response.json();
          
          if (data.success) {
            this.state.confidences = data.data;
            this.renderConfidences();
            Debug.success(`✅ Loaded ${data.data.length} confidences`);
          } else {
            throw new Error(data.message);
          }
        } catch (error) {
          Debug.error(`❌ Load confidences error: ${error.message}`);
          document.getElementById('confidencesList').innerHTML = '<div class="empty-state">Impossible de charger les confidences</div>';
        }
      },
      
      async publishConfidence() {
        if (!this.state.user) {
          alert('Tu dois t\'inscrire pour publier une confidence');
          this.openAuthModal();
          return;
        }
        
        const text = document.getElementById('confidenceText').value.trim();
        const chapter = document.getElementById('chapterSelect').value;
        
        if (!text || text.length < 10) {
          alert('Ton message est trop court (minimum 10 caractères)');
          return;
        }
        
        Debug.info(`Publishing confidence... (${text.length} chars, chapter: ${chapter})`);
        
        const btn = document.getElementById('publishBtn');
        btn.disabled = true;
        btn.textContent = '🤖 Analyse IA en cours...';
        
        try {
          const response = await fetch('/api/confidences', {
            method: 'POST',
            headers: { 
              'Content-Type': 'application/json',
              'X-User-Id': this.state.user.id
            },
            body: JSON.stringify({ text, chapter })
          });
          
          const data = await response.json();
          
          if (data.success) {
            Debug.success('✅ Confidence published successfully');
            document.getElementById('confidenceText').value = '';
            await this.loadConfidences();
            await this.loadNotifications();
            
            if (data.data?.notification) {
              setTimeout(() => {
                this.state.notificationPanelOpen = true;
                document.getElementById('notificationPanel').classList.add('open');
                this.renderNotifications();
              }, 500);
            }
            
            alert('✅ Ton histoire a été partagée anonymement.');
          } else {
            Debug.error(`❌ Publish failed: ${data.message}`);
            alert('❌ ' + data.message);
          }
        } catch (error) {
          Debug.error(`❌ Publish error: ${error.message}`);
          alert('Erreur lors de la publication');
        } finally {
          btn.disabled = false;
          btn.textContent = 'Partager anonymement';
        }
      },
      
      renderConfidences() {
        const container = document.getElementById('confidencesList');
        
        let filtered = this.state.confidences;
        if (this.state.currentChapter !== 'all') {
          filtered = filtered.filter(c => c.chapter === this.state.currentChapter);
        }
        
        if (filtered.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <div style="font-size: 3rem; margin-bottom: 20px;">📖</div>
              <div style="font-size: 1.2rem;">Aucune confidence dans ce chapitre.</div>
              <div style="margin-top: 10px;">Sois le premier à partager ton histoire.</div>
            </div>
          `;
          return;
        }
        
        container.innerHTML = filtered.map(conf => `
          <div class="confidence-card">
            <div class="confidence-meta">
              <div class="avatar"></div>
              <span>${this.getChapterEmoji(conf.chapter)} ${this.formatDate(conf.created_at)}</span>
            </div>
            
            <div class="confidence-text">${this.escapeHtml(conf.text)}</div>
            
            <div class="confidence-actions">
              <button class="action-btn">💙 Réconfortant</button>
              <button class="action-btn">💡 Utile</button>
              <button class="action-btn">🤍 J'y repense</button>
            </div>
          </div>
        `).join('');
      },
      
      // ========== HELPERS ==========
      getChapterEmoji(chapter) {
        const emojis = {
          ruptures: '💔',
          isolement: '😔',
          trauma: '🔥',
          espoir: '🤝'
        };
        return emojis[chapter] || '🌌';
      },
      
      formatDate(dateString) {
        const date = new Date(dateString);
        const now = new Date();
        const diff = now - date;
        
        const minutes = Math.floor(diff / 60000);
        const hours = Math.floor(diff / 3600000);
        const days = Math.floor(diff / 86400000);
        
        if (minutes < 1) return 'À l\'instant';
        if (minutes < 60) return `Il y a ${minutes} min`;
        if (hours < 24) return `Il y a ${hours}h`;
        if (days < 7) return `Il y a ${days}j`;
        return date.toLocaleDateString('fr-FR');
      },
      
      escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }
    };
    
    // ========== AUTO-DIAGNOSTICS ==========
    window.addEventListener('load', async () => {
      Debug.info('=== AUTO-DIAGNOSTICS START ===');
      
      // Test 1: Backend connectivity
      try {
        const response = await fetch('/api/health');
        const data = await response.json();
        
        if (data.status === 'ok') {
          Debug.success('✅ Backend connected');
          Debug.success(`✅ Database: ${data.services?.database || 'unknown'}`);
          Debug.success(`✅ AI: ${data.services?.ai || 'unknown'}`);
        } else {
          Debug.error('❌ Backend health check failed');
        }
      } catch (error) {
        Debug.error(`❌ Backend unreachable: ${error.message}`);
      }
      
      // Test 2: LocalStorage
      try {
        localStorage.setItem('test', '1');
        localStorage.removeItem('test');
        Debug.success('✅ LocalStorage available');
      } catch (error) {
        Debug.error('❌ LocalStorage blocked');
      }
      
      // Test 3: DOM elements
      const criticalElements = [
        'authContainer',
        'notificationBell',
        'publishBtn',
        'confidencesList',
        'debugConsole'
      ];
      
      criticalElements.forEach(id => {
        if (document.getElementById(id)) {
          Debug.success(`✅ Element found: ${id}`);
        } else {
          Debug.error(`❌ Element missing: ${id}`);
        }
      });
      
      Debug.info('=== AUTO-DIAGNOSTICS COMPLETE ===');
      Debug.info('Press Ctrl+D to toggle this console');
      
      // Initialize app
      App.init();
    });
  </script>
</body>
</html>
