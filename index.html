<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confidence Book - Ton refuge émotionnel</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    :root {
      --bg-primary: #0a0a0f;
      --bg-card: #1a1a24;
      --text-primary: #e8e8f0;
      --text-secondary: #9090a8;
      --accent-hope: #6b8cff;
      --accent-pain: #ff6b9d;
      --accent-calm: #70d6a3;
      --accent-warning: #ffb86c;
      --accent-crisis: #ff5555;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      padding: 20px;
      max-width: 800px;
      margin: 0 auto;
    }
    
    header {
      text-align: center;
      padding: 40px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      margin-bottom: 40px;
      position: relative;
    }
    
    h1 {
      font-size: 2.5rem;
      font-weight: 300;
      margin-bottom: 10px;
      background: linear-gradient(135deg, var(--accent-hope), var(--accent-pain));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .tagline {
      color: var(--text-secondary);
      font-size: 1rem;
    }
    
    /* ========== NOTIFICATIONS BELL ========== */
    .notification-bell {
      position: absolute;
      top: 40px;
      right: 20px;
      cursor: pointer;
      font-size: 1.5rem;
      position: relative;
    }
    
    .notification-badge {
      position: absolute;
      top: -5px;
      right: -5px;
      background: var(--accent-crisis);
      color: white;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      font-size: 0.7rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }
    
    .notification-panel {
      position: fixed;
      top: 0;
      right: -400px;
      width: 400px;
      height: 100vh;
      background: var(--bg-card);
      box-shadow: -5px 0 20px rgba(0,0,0,0.5);
      transition: right 0.3s ease;
      z-index: 1000;
      overflow-y: auto;
      padding: 20px;
    }
    
    .notification-panel.open {
      right: 0;
    }
    
    .notification-item {
      background: var(--bg-primary);
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 15px;
      border-left: 4px solid var(--accent-hope);
    }
    
    .notification-item.crisis {
      border-left-color: var(--accent-crisis);
    }
    
    .notification-item.warning {
      border-left-color: var(--accent-warning);
    }
    
    .notification-item.support {
      border-left-color: var(--accent-calm);
    }
    
    .notification-close {
      background: rgba(255,255,255,0.1);
      border: none;
      color: var(--text-primary);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
      width: 100%;
    }
    
    .chapters {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 40px;
    }
    
    .chapter-btn {
      background: var(--bg-card);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: center;
    }
    
    .chapter-btn:hover {
      transform: translateY(-2px);
      border-color: var(--accent-hope);
    }
    
    .chapter-btn.active {
      border-color: var(--accent-hope);
      background: rgba(107, 140, 255, 0.1);
    }
    
    .confidence-card {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 30px;
      margin-bottom: 20px;
      border-left: 4px solid var(--accent-hope);
    }
    
    .confidence-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 15px;
      font-size: 0.9rem;
      color: var(--text-secondary);
    }
    
    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-hope), var(--accent-pain));
    }
    
    .confidence-text {
      font-size: 1.1rem;
      line-height: 1.8;
      margin-bottom: 20px;
      white-space: pre-wrap;
    }
    
    .confidence-actions {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }
    
    .action-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 8px 16px;
      border-radius: 8px;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    
    .action-btn:hover {
      background: rgba(255,255,255,0.1);
      color: var(--text-primary);
    }
    
    .publish-form {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 30px;
      margin-bottom: 40px;
    }
    
    textarea {
      width: 100%;
      min-height: 150px;
      background: var(--bg-primary);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 15px;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 1rem;
      resize: vertical;
      margin-bottom: 15px;
    }
    
    textarea:focus {
      outline: none;
      border-color: var(--accent-hope);
    }
    
    select {
      width: 100%;
      padding: 12px;
      background: var(--bg-primary);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text-primary);
      border-radius: 8px;
      font-size: 1rem;
      margin-bottom: 15px;
      cursor: pointer;
    }
    
    select:focus {
      outline: none;
      border-color: var(--accent-hope);
    }
    
    .submit-btn {
      background: var(--accent-hope);
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s;
      width: 100%;
    }
    
    .submit-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(107, 140, 255, 0.3);
    }
    
    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .loading {
      text-align: center;
      padding: 60px;
      color: var(--text-secondary);
    }
    
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-secondary);
    }
    
    .empty-state svg {
      width: 120px;
      height: 120px;
      margin-bottom: 20px;
      opacity: 0.3;
    }
    
    @media (max-width: 600px) {
      h1 {
        font-size: 2rem;
      }
      
      .chapters {
        grid-template-columns: repeat(2, 1fr);
      }
      
      .confidence-card {
        padding: 20px;
      }
      
      .notification-panel {
        width: 100%;
        right: -100%;
      }
      
      .notification-bell {
        right: 10px;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>Confidence Book</h1>
    <p class="tagline">Ton refuge émotionnel anonyme</p>
    
    <!-- Notification Bell -->
    <div class="notification-bell" onclick="App.toggleNotifications()">
      🔔
      <span class="notification-badge" id="notificationBadge" style="display: none;">0</span>
    </div>
  </header>

  <!-- Notification Panel -->
  <div class="notification-panel" id="notificationPanel">
    <h2 style="margin-bottom: 20px;">Notifications</h2>
    <div id="notificationsList"></div>
  </div>

  <!-- Chapitres émotionnels -->
  <section class="chapters">
    <div class="chapter-btn active" data-chapter="all">
      <div style="font-size: 2rem; margin-bottom: 10px;">🌌</div>
      <div>Toutes</div>
    </div>
    <div class="chapter-btn" data-chapter="ruptures">
      <div style="font-size: 2rem; margin-bottom: 10px;">💔</div>
      <div>Ruptures</div>
    </div>
    <div class="chapter-btn" data-chapter="isolement">
      <div style="font-size: 2rem; margin-bottom: 10px;">😔</div>
      <div>Isolement</div>
    </div>
    <div class="chapter-btn" data-chapter="trauma">
      <div style="font-size: 2rem; margin-bottom: 10px;">🔥</div>
      <div>Traumas</div>
    </div>
    <div class="chapter-btn" data-chapter="espoir">
      <div style="font-size: 2rem; margin-bottom: 10px;">🤝</div>
      <div>Espoir</div>
    </div>
  </section>

  <!-- Formulaire publication -->
  <section class="publish-form">
    <h2 style="margin-bottom: 20px;">Partage ton histoire</h2>
    <textarea 
      id="confidenceText" 
      placeholder="Écris ce que tu portes... Personne ne saura que c'est toi."
    ></textarea>
    
    <select id="chapterSelect">
      <option value="ruptures">💔 Ruptures</option>
      <option value="isolement">😔 Isolement</option>
      <option value="trauma">🔥 Traumas</option>
      <option value="espoir">🤝 Espoir</option>
    </select>
    
    <button class="submit-btn" onclick="App.publishConfidence()">
      Partager anonymement
    </button>
  </section>

  <!-- Liste des confidences -->
  <section id="confidencesList"></section>

  <script>
    const App = {
      state: {
        confidences: [],
        notifications: [],
        currentChapter: 'all',
        userId: localStorage.getItem('cb_user_id') || this.generateUserId(),
        notificationPanelOpen: false
      },
      
      generateUserId() {
        const id = 'user_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('cb_user_id', id);
        return id;
      },
      
      async init() {
        this.setupEventListeners();
        await this.loadConfidences();
        await this.loadNotifications();
        
        // Poll notifications toutes les 30s
        setInterval(() => this.loadNotifications(), 30000);
      },
      
      setupEventListeners() {
        document.querySelectorAll('.chapter-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            document.querySelectorAll('.chapter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            this.state.currentChapter = btn.dataset.chapter;
            this.renderConfidences();
          });
        });
        
        // Fermer panel si clic dehors
        document.addEventListener('click', (e) => {
          const panel = document.getElementById('notificationPanel');
          const bell = document.querySelector('.notification-bell');
          
          if (this.state.notificationPanelOpen && 
              !panel.contains(e.target) && 
              !bell.contains(e.target)) {
            this.toggleNotifications();
          }
        });
      },
      
      // ========== NOTIFICATIONS ==========
      async loadNotifications() {
        try {
          const response = await fetch('/api/notifications', {
            headers: { 'X-User-Id': this.state.userId }
          });
          
          const data = await response.json();
          
          if (data.success) {
            this.state.notifications = data.data;
            this.updateNotificationBadge();
            if (this.state.notificationPanelOpen) {
              this.renderNotifications();
            }
          }
        } catch (error) {
          console.error('Erreur chargement notifications:', error);
        }
      },
      
      updateNotificationBadge() {
        const badge = document.getElementById('notificationBadge');
        const count = this.state.notifications.length;
        
        if (count > 0) {
          badge.textContent = count > 9 ? '9+' : count;
          badge.style.display = 'flex';
        } else {
          badge.style.display = 'none';
        }
      },
      
      toggleNotifications() {
        const panel = document.getElementById('notificationPanel');
        this.state.notificationPanelOpen = !this.state.notificationPanelOpen;
        
        if (this.state.notificationPanelOpen) {
          panel.classList.add('open');
          this.renderNotifications();
        } else {
          panel.classList.remove('open');
        }
      },
      
      renderNotifications() {
        const container = document.getElementById('notificationsList');
        
        if (this.state.notifications.length === 0) {
          container.innerHTML = '<p style="color: var(--text-secondary); text-align: center;">Aucune notification</p>';
          return;
        }
        
        container.innerHTML = this.state.notifications.map(notif => `
          <div class="notification-item ${notif.type}">
            <div style="white-space: pre-wrap; margin-bottom: 10px;">${this.escapeHtml(notif.message)}</div>
            <small style="color: var(--text-secondary);">${this.formatDate(notif.created_at)}</small>
            <button class="notification-close" onclick="App.markNotificationRead('${notif.id}')">
              J'ai lu
            </button>
          </div>
        `).join('');
      },
      
      async markNotificationRead(notificationId) {
        try {
          await fetch(`/api/notifications/${notificationId}/read`, {
            method: 'POST',
            headers: { 'X-User-Id': this.state.userId }
          });
          
          await this.loadNotifications();
        } catch (error) {
          console.error('Erreur marquage notification:', error);
        }
      },
      
      // ========== CONFIDENCES ==========
      async loadConfidences() {
        try {
          document.getElementById('confidencesList').innerHTML = '<div class="loading">Chargement des histoires...</div>';
          
          const response = await fetch('/api/confidences');
          const data = await response.json();
          
          if (data.success) {
            this.state.confidences = data.data;
            this.renderConfidences();
          }
        } catch (error) {
          console.error('Erreur chargement:', error);
          document.getElementById('confidencesList').innerHTML = '<div class="empty-state">Impossible de charger les confidences</div>';
        }
      },
      
      async publishConfidence() {
        const text = document.getElementById('confidenceText').value.trim();
        const chapter = document.getElementById('chapterSelect').value;
        
        if (!text || text.length < 10) {
          alert('Ton message est un peu court... Prends le temps de t\'exprimer.');
          return;
        }
        
        const btn = document.querySelector('.submit-btn');
        btn.disabled = true;
        btn.textContent = '🤖 Analyse IA en cours...';
        
        try {
          const response = await fetch('/api/confidences', {
            method: 'POST',
            headers: { 
              'Content-Type': 'application/json',
              'X-User-Id': this.state.userId
            },
            body: JSON.stringify({ text, chapter })
          });
          
          const data = await response.json();
          
          if (data.success) {
            document.getElementById('confidenceText').value = '';
            await this.loadConfidences();
            await this.loadNotifications(); // Charger nouvelles notifications
            
            // Ouvrir panel si notification importante
            if (data.data?.notification) {
              setTimeout(() => {
                this.state.notificationPanelOpen = true;
                document.getElementById('notificationPanel').classList.add('open');
                this.renderNotifications();
              }, 500);
            }
            
            alert('✅ Ton histoire a été partagée anonymement.');
          } else {
            alert('❌ ' + data.message);
          }
        } catch (error) {
          console.error('Erreur publication:', error);
          alert('Erreur lors de la publication');
        } finally {
          btn.disabled = false;
          btn.textContent = 'Partager anonymement';
        }
      },
      
      renderConfidences() {
        const container = document.getElementById('confidencesList');
        
        let filtered = this.state.confidences;
        if (this.state.currentChapter !== 'all') {
          filtered = filtered.filter(c => c.chapter === this.state.currentChapter);
        }
        
        if (filtered.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/>
              </svg>
              <div style="font-size: 1.2rem;">Aucune confidence dans ce chapitre.</div>
              <div style="margin-top: 10px;">Sois le premier à partager ton histoire.</div>
            </div>
          `;
          return;
        }
        
        container.innerHTML = filtered.map(conf => `
          <div class="confidence-card">
            <div class="confidence-meta">
              <div class="avatar"></div>
              <span>${this.getChapterEmoji(conf.chapter)} ${this.formatDate(conf.created_at)}</span>
            </div>
            
            <div class="confidence-text">${this.escapeHtml(conf.text)}</div>
            
            <div class="confidence-actions">
              <button class="action-btn">💙 Réconfortant</button>
              <button class="action-btn">💡 Utile</button>
              <button class="action-btn">🤍 J'y repense</button>
            </div>
          </div>
        `).join('');
      },
      
      // ========== HELPERS ==========
      getChapterEmoji(chapter) {
        const emojis = {
          ruptures: '💔',
          isolement: '😔',
          trauma: '🔥',
          espoir: '🤝'
        };
        return emojis[chapter] || '🌌';
      },
      
      formatDate(dateString) {
        const date = new Date(dateString);
        const now = new Date();
        const diff = now - date;
        
        const minutes = Math.floor(diff / 60000);
        const hours = Math.floor(diff / 3600000);
        const days = Math.floor(diff / 86400000);
        
        if (minutes < 1) return 'À l\'instant';
        if (minutes < 60) return `Il y a ${minutes} min`;
        if (hours < 24) return `Il y a ${hours}h`;
        if (days < 7) return `Il y a ${days}j`;
        return date.toLocaleDateString('fr-FR');
      },
      
      escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }
    };
    
    document.addEventListener('DOMContentLoaded', () => App.init());
  </script>
</body>
</html>
