<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💜</text></svg>">
  <title>Authentication - Confidence Book</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="/assets/translations.js"></script>
  <style>
    body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }
  </style>
</head>
<body class="p-6">
  <div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-3xl shadow-2xl p-8">
      <h1 class="text-3xl font-bold text-gray-800 text-center mb-8" id="page-title"></h1>

      <div class="mb-8">
        <h2 class="text-xl font-bold text-gray-800 mb-3" id="create-title"></h2>
        <p class="text-gray-600 mb-4" id="create-subtitle"></p>
        <input type="text" id="secret-phrase" placeholder="" class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-purple-600 focus:outline-none mb-2">
        <p class="text-sm text-gray-500 mb-4" id="phrase-help"></p>
        <button onclick="createAccount()" class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 text-white font-semibold py-3 px-6 rounded-xl shadow-lg hover:shadow-xl transition" id="create-btn"></button>
      </div>

      <div class="text-center text-gray-500 mb-8">OR</div>

      <div>
        <h2 class="text-xl font-bold text-gray-800 mb-3" id="login-title"></h2>
        <p class="text-gray-600 mb-4" id="login-subtitle"></p>
        <input type="text" id="login-input" placeholder="" class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-purple-600 focus:outline-none mb-4">
        <button onclick="login()" class="w-full border-2 border-purple-600 text-purple-600 font-semibold py-3 px-6 rounded-xl hover:bg-purple-50 transition" id="login-btn"></button>
      </div>
    </div>
  </div>

  <div id="success-modal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-50">
    <div class="bg-white rounded-2xl w-full max-w-md shadow-2xl p-6">
      <h2 class="text-2xl font-bold text-center mb-4" id="success-title"></h2>
      <div class="bg-purple-50 rounded-lg p-4 mb-4">
        <p class="text-sm text-gray-600 mb-2" id="success-id-label"></p>
        <div class="flex items-center gap-2 mb-3">
          <code class="flex-1 bg-white px-3 py-2 rounded font-mono text-sm" id="generated-id"></code>
          <button onclick="copyId()" class="p-2 bg-purple-600 text-white rounded hover:bg-purple-700 transition">
            <i data-lucide="copy" class="w-4 h-4"></i>
          </button>
        </div>
        <p class="text-sm text-gray-600 mb-2" id="success-phrase-label"></p>
        <code class="block bg-white px-3 py-2 rounded font-mono text-sm mb-3" id="generated-phrase"></code>
        <p class="text-xs text-gray-600" id="success-warning"></p>
      </div>
      <button onclick="continueToApp()" class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 text-white font-semibold py-3 rounded-xl" id="continue-btn"></button>
    </div>
  </div>

  <script>
    const lang = getCurrentLanguage();
    document.getElementById('page-title').textContent = t('auth.title', lang);
    document.getElementById('create-title').textContent = t('auth.create_title', lang);
    document.getElementById('create-subtitle').textContent = t('auth.create_subtitle', lang);
    document.getElementById('secret-phrase').placeholder = t('auth.phrase_placeholder', lang);
    document.getElementById('phrase-help').textContent = t('auth.phrase_help', lang);
    document.getElementById('create-btn').textContent = t('auth.create_button', lang);
    document.getElementById('login-title').textContent = t('auth.login_title', lang);
    document.getElementById('login-subtitle').textContent = t('auth.login_subtitle', lang);
    document.getElementById('login-input').placeholder = t('auth.input_placeholder', lang);
    document.getElementById('login-btn').textContent = t('auth.login_button', lang);

    let generatedUserId = '';
    let userPhrase = '';

    async function createAccount() {
      const phrase = document.getElementById('secret-phrase').value.trim();
      
      if (phrase.length < 8) {
        alert(t('auth.error_short', lang));
        return;
      }

      try {
        const response = await fetch('/api/auth/create', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ secretPhrase: phrase })
        });

        const data = await response.json();

        if (data.success) {
          generatedUserId = data.userId;
          userPhrase = phrase;
          document.getElementById('generated-id').textContent = data.userId;
          document.getElementById('generated-phrase').textContent = phrase;
          
          document.getElementById('success-title').textContent = t('auth.success_title', lang);
          document.getElementById('success-id-label').textContent = t('auth.success_id', lang);
          document.getElementById('success-phrase-label').textContent = t('auth.success_phrase', lang);
          document.getElementById('success-warning').textContent = t('auth.success_warning', lang);
          document.getElementById('continue-btn').textContent = t('auth.understood', lang);
          
          document.getElementById('success-modal').classList.remove('hidden');
          lucide.createIcons();
        }
      } catch (error) {
        alert(t('common.error', lang));
      }
    }

    async function login() {
      const input = document.getElementById('login-input').value.trim();
      
      if (!input) return;

      try {
        const response = await fetch('/api/auth/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ input })
        });

        const data = await response.json();

        if (data.success) {
          localStorage.setItem('confidenceBookUserID', data.userId);
          location.href = '/feed.html';
        } else {
          alert(t('auth.error_invalid', lang));
        }
      } catch (error) {
        alert(t('common.error', lang));
      }
    }

    function copyId() {
      navigator.clipboard.writeText(generatedUserId);
      alert(t('common.copied', lang));
    }

    function continueToApp() {
      localStorage.setItem('confidenceBookUserID', generatedUserId);
      location.href = '/feed.html';
    }

    lucide.createIcons();
  </script>
</body>
</html>
